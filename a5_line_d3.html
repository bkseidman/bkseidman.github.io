<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Line Chart in D3</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { font-family: Arial, sans-serif; margin: 40px; }
.title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
.legend-title { font-size: 12px; font-weight: bold; }
</style>
</head>

<body>

<div class="title">
BMW Revenue Over Time by Region (Yearly Totals)
</div>

<svg id="chart" width="950" height="550"></svg>

<script>

/*
CITATIONS:

D3 official documentation for time scales, axes, line generators, and rollups:
   https://d3js.org/d3-scale/time
   https://d3js.org/d3-axis
   https://d3js.org/d3-shape/line
   https://d3js.org/d3-array  (rollups / grouping)

Time-series line chart structure adapted from:
   D3 Graph Gallery – Line Chart (basic structure)
   https://d3-graph-gallery.com/graph/line_basic.html
*/

const CSV = "bmw_sales.csv";

const svg = d3.select("#chart");
const width = +svg.attr("width");
const height = +svg.attr("height");

const margin = { top: 40, right: 220, bottom: 60, left: 110 };
const innerW = width - margin.left - margin.right;
const innerH = height - margin.top - margin.bottom;

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

d3.csv(CSV, d => ({
  year: +d.Year,
  region: d.Region,
  revenue: +d.Revenue_EUR
}))
.then(rows => {

  // Sum revenue per (region, year)
  const grouped = d3.rollups(
    rows,
    v => d3.sum(v, d => d.revenue),
    d => d.region,
    d => d.year
  );

  const regions = grouped.map(d => d[0]);

  // Convert to "series" format for line drawing
  const series = grouped.map(([region, yearArr]) => ({
    region,
    values: yearArr
      .map(([year, revenue]) => ({
        date: new Date(year, 0, 1), // time on x-axis (year)
        year,
        revenue
      }))
      .sort((a,b) => d3.ascending(a.year, b.year))
  }));

  const allDates = series.flatMap(s => s.values.map(v => v.date));
  const allRevenue = series.flatMap(s => s.values.map(v => v.revenue));

  const x = d3.scaleTime()
    .domain(d3.extent(allDates))
    .range([0, innerW]);

  const y = d3.scaleLinear()
    .domain([0, d3.max(allRevenue)]).nice()
    .range([innerH, 0]);

  const color = d3.scaleOrdinal()
    .domain(regions)
    .range(d3.schemeTableau10);

  // Axes (clean, not too many ticks)
  g.append("g")
    .attr("transform", `translate(0,${innerH})`)
    .call(d3.axisBottom(x).ticks(d3.timeYear.every(1)).tickFormat(d3.timeFormat("%Y")));

  g.append("g")
    .call(
      d3.axisLeft(y)
        .ticks(6)
        .tickFormat(d => "€" + (d/1_000_000_000).toFixed(0) + "B")
    );

  // Axis labels
  svg.append("text")
    .attr("x", margin.left + innerW/2)
    .attr("y", height - 15)
    .attr("text-anchor","middle")
    .text("Year");

  svg.append("text")
    .attr("transform","rotate(-90)")
    .attr("x", -(margin.top + innerH/2))
    .attr("y", 35)
    .attr("text-anchor","middle")
    .text("Revenue (EUR)");

  const line = d3.line()
    .x(d => x(d.date))
    .y(d => y(d.revenue));

  // Draw the lines (one per region)
  g.selectAll(".line")
    .data(series)
    .enter()
    .append("path")
    .attr("fill","none")
    .attr("stroke", d => color(d.region))
    .attr("stroke-width", 3)
    .attr("d", d => line(d.values));

  // Add points to make yearly values obvious
  g.selectAll(".points")
    .data(series)
    .enter()
    .append("g")
    .selectAll("circle")
    .data(d => d.values.map(v => ({...v, region: d.region})))
    .enter()
    .append("circle")
    .attr("cx", d => x(d.date))
    .attr("cy", d => y(d.revenue))
    .attr("r", 4)
    .attr("fill", d => color(d.region));

  // Legend
  const legend = svg.append("g")
    .attr("transform", `translate(${margin.left + innerW + 30}, 70)`);

  legend.append("text")
    .attr("class","legend-title")
    .attr("y",-10)
    .text("Region");

  regions.forEach((region, i) => {
    const row = legend.append("g")
      .attr("transform", `translate(0, ${i * 25})`);

    row.append("rect")
      .attr("width", 14)
      .attr("height", 14)
      .attr("fill", color(region));

    row.append("text")
      .attr("x", 20)
      .attr("y", 12)
      .text(region);
  });

});
</script>

</body>
</html>
