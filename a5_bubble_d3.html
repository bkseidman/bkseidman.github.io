<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bubble Chart in D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { font-family: Arial, sans-serif; margin: 40px; }
.title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }

.tooltip {
  position: absolute;
  pointer-events: none;
  background: white;
  border: 1px solid #ccc;
  padding: 8px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
}
</style>
</head>

<body>

<div class="title">
BMW Sales Bubble Chart (Units vs Price vs Revenue, Colored by Region)
</div>

<svg id="chart" width="950" height="550"></svg>
<div id="tooltip" class="tooltip"></div>

<script>

/*
CITATIONS:

D3 official documentation for scales and axes:
   https://d3js.org/d3-scale
   https://d3js.org/d3-axis

Bubble chart tooltip interaction pattern adapted from D3 Graph Gallery 
   Bubble plot with tooltip:
   https://d3-graph-gallery.com/graph/bubble_tooltip.html

*/

const CSV = "bmw_sales.csv";

const svg = d3.select("#chart");
const tooltip = d3.select("#tooltip");

const width = +svg.attr("width");
const height = +svg.attr("height");

const margin = { top: 30, right: 40, bottom: 70, left: 80 };
const innerW = width - margin.left - margin.right;
const innerH = height - margin.top - margin.bottom;

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

d3.csv(CSV, d => ({
  year: +d.Year,
  month: +d.Month,
  region: d.Region,
  model: d.Model,
  units: +d.Units_Sold,
  price: +d.Avg_Price_EUR,
  revenue: +d.Revenue_EUR,
  bev: +d.BEV_Share
}))
.then(data => {

  const x = d3.scaleLinear()
    .domain(d3.extent(data, d => d.units)).nice()
    .range([0, innerW]);

  const y = d3.scaleLinear()
    .domain(d3.extent(data, d => d.price)).nice()
    .range([innerH, 0]);

  const r = d3.scaleSqrt()
    .domain(d3.extent(data, d => d.revenue))
    .range([3, 25]);

  const regions = Array.from(new Set(data.map(d => d.region)));
  const color = d3.scaleOrdinal()
    .domain(regions)
    .range(d3.schemeTableau10);

  g.append("g")
    .attr("transform", `translate(0,${innerH})`)
    .call(d3.axisBottom(x));

  g.append("g")
    .call(d3.axisLeft(y));

  svg.append("text")
    .attr("x", margin.left + innerW / 2)
    .attr("y", height - 20)
    .attr("text-anchor", "middle")
    .text("Units Sold");

  svg.append("text")
    .attr("transform", "rotate(-90)")
    .attr("x", -(margin.top + innerH / 2))
    .attr("y", 20)
    .attr("text-anchor", "middle")
    .text("Average Price (EUR)");

  g.selectAll("circle")
    .data(data)
    .enter()
    .append("circle")
    .attr("cx", d => x(d.units))
    .attr("cy", d => y(d.price))
    .attr("r", d => r(d.revenue))
    .attr("fill", d => color(d.region))
    .attr("opacity", 0.7)
    .on("mousemove", (event, d) => {
      tooltip
        .style("opacity", 1)
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY + 10) + "px")
        .html(
          `<b>Model:</b> ${d.model}<br>
           <b>Region:</b> ${d.region}<br>
           <b>Date:</b> ${d.year}-${d.month}<br>
           <b>Revenue:</b> €${d.revenue.toLocaleString()}<br>
           <b>BEV Share:</b> ${d.bev}`
        );
    })
    .on("mouseleave", () => tooltip.style("opacity", 0));

});

</script>

</body>
</html>
