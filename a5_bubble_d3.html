<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bubble Chart in D3</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3-legend.susielu.com/d3-legend.min.js"></script>

<style>
body { font-family: Arial, sans-serif; margin: 40px; }
.title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
.note { color: #444; margin: 8px 0 18px; max-width: 920px; }

.tooltip {
  position: absolute;
  pointer-events: none;
  background: white;
  border: 1px solid #ccc;
  padding: 8px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
}

.legend-title { font-size: 12px; font-weight: bold; }
</style>
</head>

<body>

<div class="title">
BMW Sales Bubble Chart (Units Sold vs Average Price, Sized by Revenue, Colored by Region)
</div>

<div class="note">
Each bubble is a summary for a region and month (month 1–12), aggregated across all years and models.
</div>

<svg id="chart" width="950" height="550"></svg>
<div id="tooltip" class="tooltip"></div>

<script>

/*
CITATIONS:

D3 official documentation for scales, axes, and grouping:
   https://d3js.org/d3-scale
   https://d3js.org/d3-axis
   https://d3js.org/d3-array  (rollups / grouping)

Bubble chart tooltip interaction pattern adapted from D3 Graph Gallery
   Bubble plot with tooltip:
   https://d3-graph-gallery.com/graph/bubble_tooltip.html

d3-legend library by Susie Lu (used for the color + size legends):
   https://d3-legend.susielu.com/
*/

const CSV = "bmw_sales.csv";

const svg = d3.select("#chart");
const tooltip = d3.select("#tooltip");

const width = +svg.attr("width");
const height = +svg.attr("height");

// leave room on right for legends
const margin = { top: 30, right: 260, bottom: 70, left: 90 };
const innerW = width - margin.left - margin.right;
const innerH = height - margin.top - margin.bottom;

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

d3.csv(CSV, d => ({
  year: +d.Year,
  month: +d.Month,
  region: d.Region,
  model: d.Model,
  units: +d.Units_Sold,
  price: +d.Avg_Price_EUR,
  revenue: +d.Revenue_EUR
}))
.then(raw => {

  // Aggregate to: Region × Month across all years/models
  // - avg units sold
  // - avg price
  // - total revenue
  const grouped = d3.rollups(
    raw,
    v => ({
      units_avg: d3.mean(v, d => d.units),
      price_avg: d3.mean(v, d => d.price),
      revenue_total: d3.sum(v, d => d.revenue),
      n: v.length
    }),
    d => d.region,
    d => d.month
  );

  const data = [];
  for (const [region, monthArr] of grouped) {
    for (const [month, stats] of monthArr) {
      if (!Number.isFinite(stats.units_avg) || !Number.isFinite(stats.price_avg) || !Number.isFinite(stats.revenue_total)) continue;
      data.push({ region, month: +month, ...stats });
    }
  }

  data.sort((a,b) => d3.ascending(a.region, b.region) || d3.ascending(a.month, b.month));

  const regions = Array.from(new Set(data.map(d => d.region)));

  const x = d3.scaleLinear()
    .domain(d3.extent(data, d => d.units_avg)).nice()
    .range([0, innerW]);

  const y = d3.scaleLinear()
    .domain(d3.extent(data, d => d.price_avg)).nice()
    .range([innerH, 0]);

  const r = d3.scaleSqrt()
    .domain(d3.extent(data, d => d.revenue_total))
    .range([5, 22]);

  const color = d3.scaleOrdinal()
    .domain(regions)
    .range(d3.schemeTableau10);

  // Gridlines (helps readability)
  g.append("g")
    .attr("opacity", 0.15)
    .call(d3.axisLeft(y).ticks(6).tickSize(-innerW).tickFormat(""));

  g.append("g")
    .attr("transform", `translate(0,${innerH})`)
    .attr("opacity", 0.15)
    .call(d3.axisBottom(x).ticks(6).tickSize(-innerH).tickFormat(""));

  // Axes with nice formatting
  g.append("g")
    .attr("transform", `translate(0,${innerH})`)
    .call(d3.axisBottom(x).ticks(6).tickFormat(d3.format(",")));

  g.append("g")
    .call(d3.axisLeft(y).ticks(6).tickFormat(d => "€" + d3.format(",")(d)));

  // Axis labels
  svg.append("text")
    .attr("x", margin.left + innerW / 2)
    .attr("y", height - 20)
    .attr("text-anchor", "middle")
    .text("Units Sold (average)");

  svg.append("text")
    .attr("transform", "rotate(-90)")
    .attr("x", -(margin.top + innerH / 2))
    .attr("y", 25)
    .attr("text-anchor", "middle")
    .text("Average Price (EUR)");

  // Bubbles
  g.selectAll("circle")
    .data(data)
    .enter()
    .append("circle")
    .attr("cx", d => x(d.units_avg))
    .attr("cy", d => y(d.price_avg))
    .attr("r", d => r(d.revenue_total))
    .attr("fill", d => color(d.region))
    .attr("opacity", 0.65)
    .attr("stroke", "white")
    .attr("stroke-width", 0.8)
    .on("mousemove", (event, d) => {
      tooltip
        .style("opacity", 1)
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY + 10) + "px")
        .html(
          `<b>Region:</b> ${d.region}<br>
           <b>Month:</b> ${d.month}<br>
           <b>Avg Units Sold:</b> ${d.units_avg.toFixed(0)}<br>
           <b>Avg Price:</b> €${Math.round(d.price_avg).toLocaleString()}<br>
           <b>Total Revenue:</b> €${Math.round(d.revenue_total).toLocaleString()}`
        );
    })
    .on("mouseleave", () => tooltip.style("opacity", 0));

  // Legends
  const legendX = margin.left + innerW + 30;

  svg.append("text")
    .attr("x", legendX)
    .attr("y", 55)
    .attr("class", "legend-title")
    .text("Region");

  const colorLegend = d3.legendColor()
    .scale(color)
    .shape("circle")
    .shapePadding(8);

  svg.append("g")
    .attr("transform", `translate(${legendX}, 70)`)
    .call(colorLegend);

  svg.append("text")
    .attr("x", legendX)
    .attr("y", 230)
    .attr("class", "legend-title")
    .text("Revenue (EUR)");

  const sizeLegend = d3.legendSize()
    .scale(r)
    .shape("circle")
    .shapePadding(10)
    .labelFormat(d => {
      const billions = d / 1_000_000_000;
      return billions.toFixed(0) + " Billion";
    });

  svg.append("g")
    .attr("transform", `translate(${legendX}, 250)`)
    .call(sizeLegend);

});
</script>

</body>
</html>
