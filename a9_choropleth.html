<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assignment 9 — County Poverty Choropleth</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h1 { margin-bottom: 8px; }
    p { margin-top: 0; color: #444; }
    svg { background: white; border: 1px solid #ddd; }

    .county {
      stroke: none;
    }

    .state-boundary {
      fill: none;
      stroke: #ffffff;
      stroke-width: 0.7;
      pointer-events: none;
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      background: white;
      border: 1px solid #999;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 13px;
      color: #222;
      opacity: 0;
    }

    .legend-label {
      font-size: 12px;
    }

    .chart-title {
      font-size: 24px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <h1>County Choropleth Map</h1>
  <p>County poverty rate in 2023, with the top 10 states aggregated from county poverty counts.</p>

  <svg id="chart" width="1250" height="850"></svg>
  <div id="tooltip" class="tooltip"></div>

  <script>
  /*
  CITATIONS:

  D3 official documentation for geographic projections, paths, CSV loading, scales, and selections:
     https://d3js.org/d3-geo
     https://d3js.org/d3-fetch
     https://d3js.org/d3-scale
     https://d3js.org/d3-selection/events

  TopoJSON client for converting TopoJSON to GeoJSON:
     https://github.com/topojson/topojson-client

  U.S. counties TopoJSON source:
     https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json
  */

    const svg = d3.select("#chart");
    const width = +svg.attr("width");
    const height = +svg.attr("height");
    const tooltip = d3.select("#tooltip");

    const stateAbbrToName = {
      AL: "Alabama", AK: "Alaska", AZ: "Arizona", AR: "Arkansas", CA: "California",
      CO: "Colorado", CT: "Connecticut", DE: "Delaware", DC: "District of Columbia",
      FL: "Florida", GA: "Georgia", HI: "Hawaii", ID: "Idaho", IL: "Illinois",
      IN: "Indiana", IA: "Iowa", KS: "Kansas", KY: "Kentucky", LA: "Louisiana",
      ME: "Maine", MD: "Maryland", MA: "Massachusetts", MI: "Michigan", MN: "Minnesota",
      MS: "Mississippi", MO: "Missouri", MT: "Montana", NE: "Nebraska", NV: "Nevada",
      NH: "New Hampshire", NJ: "New Jersey", NM: "New Mexico", NY: "New York",
      NC: "North Carolina", ND: "North Dakota", OH: "Ohio", OK: "Oklahoma",
      OR: "Oregon", PA: "Pennsylvania", RI: "Rhode Island", SC: "South Carolina",
      SD: "South Dakota", TN: "Tennessee", TX: "Texas", UT: "Utah", VT: "Vermont",
      VA: "Virginia", WA: "Washington", WV: "West Virginia", WI: "Wisconsin", WY: "Wyoming"
    };

    Promise.all([
      d3.csv("poverty_clean.csv", d => ({
        fips: String(d.FIPS_Code).trim(),
        stabr: String(d.Stabr).trim(),
        area: String(d.Area_Name).trim(),
        attribute: String(d.Attribute).trim(),
        value: +d.Value
      })),
      d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json")
    ]).then(([rawData, us]) => {
      const counties = topojson.feature(us, us.objects.counties);
      const statesMesh = topojson.mesh(us, us.objects.states, (a, b) => a !== b);

      const projection = d3.geoAlbersUsa()
        .fitSize([1000, 660], counties);

      const path = d3.geoPath().projection(projection);

      // County-level poverty RATE rows
      const countyRateRows = rawData.filter(d =>
        d.attribute === "PCTPOVALL_2023" &&
        d.fips !== "0" &&
        d.fips.length === 5
      );

      const countyRateMap = new Map();
      countyRateRows.forEach(d => {
        countyRateMap.set(d.fips.padStart(5, "0"), d);
      });

      // County-level poverty COUNT rows, aggregated to state for Top 10 list
      const countyCountRows = rawData.filter(d =>
        d.attribute === "POVALL_2023" &&
        d.fips !== "0" &&
        d.fips.length === 5
      );

      const stateTotals = d3.rollups(
        countyCountRows,
        v => d3.sum(v, d => d.value),
        d => d.stabr
      ).map(([stabr, total]) => ({
        stabr: stabr,
        name: stateAbbrToName[stabr] || stabr,
        total: total
      }))
       .sort((a, b) => d3.descending(a.total, b.total))
       .slice(0, 10);

      const values = countyRateRows.map(d => d.value);

      const color = d3.scaleSequential()
        .domain([d3.min(values), d3.max(values)])
        .interpolator(d3.interpolateBlues);

      svg.append("text")
        .attr("class", "chart-title")
        .attr("x", width / 2)
        .attr("y", 42)
        .attr("text-anchor", "middle")
        .text("County Poverty Rate (2023)");

      svg.append("text")
        .attr("x", width / 2)
        .attr("y", 66)
        .attr("text-anchor", "middle")
        .attr("font-size", 14)
        .attr("fill", "#555")
        .text("Top 10 states are aggregated from county poverty counts");

      const mapGroup = svg.append("g")
        .attr("transform", "translate(35,95)");

      mapGroup.selectAll("path.county")
        .data(counties.features)
        .enter()
        .append("path")
        .attr("class", "county")
        .attr("d", path)
        .attr("fill", d => {
          const fips = String(d.id).padStart(5, "0");
          const row = countyRateMap.get(fips);
          return row ? color(row.value) : "#eeeeee";
        })
        .on("mouseover", function(event, d) {
          const fips = String(d.id).padStart(5, "0");
          const row = countyRateMap.get(fips);

          d3.select(this).attr("opacity", 0.8);

          if (row) {
            tooltip
              .style("opacity", 1)
              .html(
                `<strong>${row.area}</strong><br>` +
                `State: ${row.stabr}<br>` +
                `Poverty rate: ${row.value.toFixed(1)}%`
              );
          } else {
            tooltip
              .style("opacity", 1)
              .html(`No data`);
          }
        })
        .on("mousemove", function(event) {
          tooltip
            .style("left", (event.pageX + 12) + "px")
            .style("top", (event.pageY - 28) + "px");
        })
        .on("mouseout", function() {
          d3.select(this).attr("opacity", 1);
          tooltip.style("opacity", 0);
        });

      mapGroup.append("path")
        .datum(statesMesh)
        .attr("class", "state-boundary")
        .attr("d", path);

      // Legend
      const legendWidth = 300;
      const legendHeight = 14;
      const legendX = 820;
      const legendY = 770;

      const legendScale = d3.scaleLinear()
        .domain(color.domain())
        .range([0, legendWidth]);

      const legendAxis = d3.axisBottom(legendScale)
        .ticks(6)
        .tickFormat(d => d + "%");

      const defs = svg.append("defs");

      const linearGradient = defs.append("linearGradient")
        .attr("id", "legend-gradient");

      linearGradient.selectAll("stop")
        .data(d3.range(0, 1.01, 0.1))
        .enter()
        .append("stop")
        .attr("offset", d => (d * 100) + "%")
        .attr("stop-color", d => color(
          color.domain()[0] + d * (color.domain()[1] - color.domain()[0])
        ));

      svg.append("text")
        .attr("class", "legend-label")
        .attr("x", legendX)
        .attr("y", legendY - 12)
        .text("County Poverty Rate (%)");

      svg.append("rect")
        .attr("x", legendX)
        .attr("y", legendY)
        .attr("width", legendWidth)
        .attr("height", legendHeight)
        .attr("fill", "url(#legend-gradient)")
        .attr("stroke", "#999");

      svg.append("g")
        .attr("transform", `translate(${legendX},${legendY + legendHeight})`)
        .call(legendAxis);

      // Top 10 list
      const top10ListX = 1040;
      const top10ListY = 145;

      svg.append("text")
        .attr("x", top10ListX)
        .attr("y", top10ListY)
        .attr("font-size", 14)
        .attr("font-weight", 700)
        .text("Top 10 States");

      svg.append("text")
        .attr("x", top10ListX)
        .attr("y", top10ListY + 18)
        .attr("font-size", 11)
        .attr("fill", "#555")
        .text("By total people in poverty");

      svg.selectAll("text.top10-list")
        .data(stateTotals)
        .enter()
        .append("text")
        .attr("x", top10ListX)
        .attr("y", (d, i) => top10ListY + 42 + i * 18)
        .attr("font-size", 12)
        .text(d => `${d.stabr} (${d3.format(",")(Math.round(d.total))})`);
    });
  </script>
</body>
</html>
