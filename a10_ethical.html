<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assignment 10 — Ethical Chart</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        line-height: 1.4;
      }

      h1 {
        margin-bottom: 6px;
      }

      p {
        max-width: 800px;
      }

      .axis-label {
        font-size: 14px;
      }

      .line {
        fill: none;
        stroke: steelblue;
        stroke-width: 3;
      }

      .dot {
        fill: steelblue;
        stroke: black;
        stroke-width: 0.8px;
      }

      .note {
        color: #444;
        max-width: 800px;
      }
    </style>
  </head>

  <body>
    <h1>Average Student Sleep Hours Over Eight Weeks</h1>
    <p class="note">
      This chart shows the same dataset as the deceptive version, but uses a more accurate scale,
      neutral colors, and clearer framing so the increase is shown in proper context.
    </p>

    <svg width="760" height="500"></svg>

    <script>
      const data = [
        { week: 1, sleep_hours: 6.5 },
        { week: 2, sleep_hours: 6.8 },
        { week: 3, sleep_hours: 7.0 },
        { week: 4, sleep_hours: 7.2 },
        { week: 5, sleep_hours: 7.1 },
        { week: 6, sleep_hours: 7.3 },
        { week: 7, sleep_hours: 7.5 },
        { week: 8, sleep_hours: 7.6 }
      ];

      const svg = d3.select("svg");
      const width = +svg.attr("width");
      const height = +svg.attr("height");

      const margin = { top: 40, right: 40, bottom: 60, left: 70 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      const chart = svg.append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      const x = d3.scaleLinear()
        .domain([1, 8])
        .range([0, innerWidth]);

      const y = d3.scaleLinear()
        .domain([0, 8])
        .range([innerHeight, 0]);

      const xAxis = d3.axisBottom(x)
        .ticks(8)
        .tickFormat(d3.format("d"));

      const yAxis = d3.axisLeft(y)
        .ticks(8);

      chart.append("g")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(xAxis);

      chart.append("g")
        .call(yAxis);

      chart.append("text")
        .attr("class", "axis-label")
        .attr("x", innerWidth / 2)
        .attr("y", innerHeight + 45)
        .attr("text-anchor", "middle")
        .text("Week");

      chart.append("text")
        .attr("class", "axis-label")
        .attr("transform", "rotate(-90)")
        .attr("x", -innerHeight / 2)
        .attr("y", -45)
        .attr("text-anchor", "middle")
        .text("Hours of Sleep");

      const line = d3.line()
        .x(d => x(d.week))
        .y(d => y(d.sleep_hours));

      chart.append("path")
        .datum(data)
        .attr("class", "line")
        .attr("d", line);

      chart.selectAll(".dot")
        .data(data)
        .enter()
        .append("circle")
        .attr("class", "dot")
        .attr("cx", d => x(d.week))
        .attr("cy", d => y(d.sleep_hours))
        .attr("r", 5);
    </script>
  </body>
</html>
