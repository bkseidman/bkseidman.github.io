<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scatterplot Matrix in D3</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { font-family: Arial, sans-serif; margin: 40px; }
.title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
.note { color: #444; margin: 8px 0 18px; max-width: 980px; }

.axis text { font-size: 10px; }
.axis path, .axis line { stroke: #ccc; }
.frame { fill: none; stroke: #ccc; }

.cell circle { opacity: 0.55; }

.legend-title { font-size: 12px; font-weight: bold; }

.tooltip {
  position: absolute;
  pointer-events: none;
  background: white;
  border: 1px solid #ccc;
  padding: 6px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
}
</style>
</head>

<body>

<div class="title">BMW Scatterplot Matrix (3×3)</div>
<div class="note">
Compares 3 numeric variables (Units Sold, Average Price, Revenue). Color indicates Region.
</div>

<svg id="chart" width="980" height="980"></svg>
<div id="tooltip" class="tooltip"></div>

<script>

/*
CITATIONS:

D3 official documentation for scales and axes:
   https://d3js.org/d3-scale
   https://d3js.org/d3-axis

Scatterplot matrix concept + layout approach adapted from:
   Mike Bostock (D3) – Scatterplot Matrix example
   https://observablehq.com/@d3/scatterplot-matrix
*/

const CSV = "bmw_sales.csv";

const svg = d3.select("#chart");
const tooltip = d3.select("#tooltip");

const width = +svg.attr("width");
const height = +svg.attr("height");

// Pick 3 variables for a 3×3 matrix
const vars = [
  { key: "units", label: "Units Sold" },
  { key: "price", label: "Avg Price (EUR)" },
  { key: "revenue", label: "Revenue (EUR)" }
];
const n = vars.length;

const margin = { top: 70, right: 220, bottom: 80, left: 90 };
const gridW = width - margin.left - margin.right;
const gridH = height - margin.top - margin.bottom;

const cellSize = Math.floor(Math.min(gridW, gridH) / n);
const padding = 28;

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

d3.csv(CSV, d => ({
  year: +d.Year,
  month: +d.Month,
  region: d.Region,
  model: d.Model,
  units: +d.Units_Sold,
  price: +d.Avg_Price_EUR,
  revenue: +d.Revenue_EUR
}))
.then(data => {

  // Safety: drop rows with bad numbers
  data = data.filter(d =>
    Number.isFinite(d.units) &&
    Number.isFinite(d.price) &&
    Number.isFinite(d.revenue) &&
    d.region
  );

  // Scatterplot matrix draws points n*n times; sampling keeps it fast + clean
  const MAX_POINTS = 2000;
  if (data.length > MAX_POINTS) data = d3.shuffle(data).slice(0, MAX_POINTS);

  const regions = Array.from(new Set(data.map(d => d.region)));
  const color = d3.scaleOrdinal()
    .domain(regions)
    .range(d3.schemeTableau10);

  // One scale per variable (shared across the whole matrix)
  const x = new Map();
  const y = new Map();

  vars.forEach(v => {
    x.set(v.key, d3.scaleLinear()
      .domain(d3.extent(data, d => d[v.key])).nice()
      .range([padding, cellSize - padding])
    );

    y.set(v.key, d3.scaleLinear()
      .domain(d3.extent(data, d => d[v.key])).nice()
      .range([cellSize - padding, padding])
    );
  });

  // Axis groups: bottom row x-axes
  g.selectAll(".x.axis")
    .data(vars)
    .enter()
    .append("g")
    .attr("class", "x axis")
    .attr("transform", (v, i) => `translate(${i * cellSize}, ${n * cellSize})`)
    .each(function(v) {
      d3.select(this).call(d3.axisBottom(x.get(v.key)).ticks(4));
    });

  // Axis groups: left column y-axes
  g.selectAll(".y.axis")
    .data(vars)
    .enter()
    .append("g")
    .attr("class", "y axis")
    .attr("transform", (v, j) => `translate(0, ${j * cellSize})`)
    .each(function(v) {
      d3.select(this).call(d3.axisLeft(y.get(v.key)).ticks(4));
    });

  // Labels
  g.selectAll(".x.label")
    .data(vars)
    .enter()
    .append("text")
    .attr("x", (v,i) => i * cellSize + cellSize / 2)
    .attr("y", n * cellSize + 50)
    .attr("text-anchor", "middle")
    .style("font-size", "12px")
    .text(v => v.label);

  g.selectAll(".y.label")
    .data(vars)
    .enter()
    .append("text")
    .attr("transform", (v,j) => `translate(-60, ${j * cellSize + cellSize / 2}) rotate(-90)`)
    .attr("text-anchor", "middle")
    .style("font-size", "12px")
    .text(v => v.label);

  // Clip paths (so points stay inside cells)
  const defs = svg.append("defs");
  vars.forEach((vx, i) => {
    vars.forEach((vy, j) => {
      defs.append("clipPath")
        .attr("id", `clip-${i}-${j}`)
        .append("rect")
        .attr("x", 0)
        .attr("y", 0)
        .attr("width", cellSize)
        .attr("height", cellSize);
    });
  });

  // Cells (vx, vy) pairs
  const cell = g.selectAll(".cell")
    .data(d3.cross(vars, vars))
    .enter()
    .append("g")
    .attr("class", "cell")
    .attr("transform", ([vx, vy]) => {
      const i = vars.findIndex(v => v.key === vx.key);
      const j = vars.findIndex(v => v.key === vy.key);
      return `translate(${i * cellSize}, ${j * cellSize})`;
    });

  cell.append("rect")
    .attr("class", "frame")
    .attr("x", 0)
    .attr("y", 0)
    .attr("width", cellSize)
    .attr("height", cellSize);

  // Draw points inside each cell
  cell.each(function([vx, vy]) {
    const i = vars.findIndex(v => v.key === vx.key);
    const j = vars.findIndex(v => v.key === vy.key);

    const cx = x.get(vx.key);
    const cy = y.get(vy.key);

    d3.select(this)
      .attr("clip-path", `url(#clip-${i}-${j})`)
      .selectAll("circle")
      .data(data)
      .enter()
      .append("circle")
      .attr("cx", d => cx(d[vx.key]))
      .attr("cy", d => cy(d[vy.key]))
      .attr("r", 2.5)
      .attr("fill", d => color(d.region))
      .on("mousemove", (event, d) => {
        tooltip
          .style("opacity", 1)
          .style("left", (event.pageX + 10) + "px")
          .style("top", (event.pageY + 10) + "px")
          .html(
            `<b>Region:</b> ${d.region}<br>
             <b>Model:</b> ${d.model}<br>
             <b>Date:</b> ${d.year}-${String(d.month).padStart(2,"0")}<br>
             <b>Units:</b> ${d.units.toLocaleString()}<br>
             <b>Avg Price:</b> €${Math.round(d.price).toLocaleString()}<br>
             <b>Revenue:</b> €${Math.round(d.revenue).toLocaleString()}`
          );
      })
      .on("mouseleave", () => tooltip.style("opacity", 0));
  });

  // Legend
  const legend = svg.append("g")
    .attr("transform", `translate(${width - 200}, 140)`);

  legend.append("text")
    .attr("class", "legend-title")
    .attr("y", -10)
    .text("Region");

  regions.forEach((region, i) => {
    const row = legend.append("g")
      .attr("transform", `translate(0, ${i * 25})`);

    row.append("rect")
      .attr("width", 14)
      .attr("height", 14)
      .attr("fill", color(region));

    row.append("text")
      .attr("x", 20)
      .attr("y", 12)
      .text(region);
  });

});
</script>

</body>
</html>
