<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assignment 10 — Ethical Chart (Real Dataset)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        line-height: 1.4;
      }

      h1 {
        margin-bottom: 6px;
      }

      .note {
        color: #444;
        max-width: 950px;
      }

      .axis-label {
        font-size: 14px;
      }

      .line {
        fill: none;
        stroke: steelblue;
        stroke-width: 3;
      }

      .dot {
        fill: steelblue;
        stroke: black;
        stroke-width: 0.8px;
      }

      .tooltip {
        position: absolute;
        background: white;
        border: 1px solid #999;
        padding: 8px 10px;
        font-size: 13px;
        pointer-events: none;
        opacity: 0;
      }
    </style>
  </head>

  <body>
    <h1>Calories in Selected McDonald’s Breakfast Items</h1>
    <p class="note">
      This chart shows calorie values for selected McDonald’s breakfast items using the same
      dataset as the deceptive version. It uses a neutral title, a full y-axis scale, and
      straightforward color choices to present the values more accurately.
    </p>

    <svg width="1100" height="620"></svg>
    <div class="tooltip"></div>

    <script>
      const data = [
        { item: "Egg McMuffin", calories: 300 },
        { item: "Egg White Delight", calories: 250 },
        { item: "Sausage McMuffin", calories: 400 },
        { item: "Sausage McMuffin with Egg", calories: 450 },
        { item: "Sausage McMuffin with Egg Whites", calories: 350 },
        { item: "Steak Egg & Cheese Biscuit", calories: 540 },
        { item: "Bacon Egg & Cheese Biscuit", calories: 460 },
        { item: "Big Breakfast", calories: 740 },
        { item: "Big Breakfast with Hotcakes", calories: 1090 },
        { item: "Hotcakes", calories: 550 }
      ];

      const svg = d3.select("svg");
      const width = +svg.attr("width");
      const height = +svg.attr("height");

      const margin = { top: 50, right: 40, bottom: 180, left: 80 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      const chart = svg.append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      const tooltip = d3.select(".tooltip");

      const x = d3.scaleBand()
        .domain(data.map(d => d.item))
        .range([0, innerWidth])
        .padding(0.2);

      const y = d3.scaleLinear()
        .domain([0, 1200])
        .range([innerHeight, 0]);

      const xAxis = d3.axisBottom(x);
      const yAxis = d3.axisLeft(y).ticks(6);

      chart.append("g")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(xAxis)
        .selectAll("text")
        .attr("transform", "rotate(-35)")
        .style("text-anchor", "end");

      chart.append("g")
        .call(yAxis);

      chart.append("text")
        .attr("class", "axis-label")
        .attr("x", innerWidth / 2)
        .attr("y", innerHeight + 140)
        .attr("text-anchor", "middle")
        .text("Breakfast Item");

      chart.append("text")
        .attr("class", "axis-label")
        .attr("transform", "rotate(-90)")
        .attr("x", -innerHeight / 2)
        .attr("y", -55)
        .attr("text-anchor", "middle")
        .text("Calories");

      chart.append("path")
        .datum(data)
        .attr("class", "line")
        .attr("d", d3.line()
          .x(d => x(d.item) + x.bandwidth() / 2)
          .y(d => y(d.calories))
        );

      chart.selectAll(".dot")
        .data(data)
        .enter()
        .append("circle")
        .attr("class", "dot")
        .attr("cx", d => x(d.item) + x.bandwidth() / 2)
        .attr("cy", d => y(d.calories))
        .attr("r", 5)
        .on("mouseover", function(event, d) {
          tooltip
            .style("opacity", 1)
            .html(
              `<strong>${d.item}</strong><br>` +
              `Calories: ${d.calories}`
            );
        })
        .on("mousemove", function(event) {
          tooltip
            .style("left", (event.pageX + 12) + "px")
            .style("top", (event.pageY - 28) + "px");
        })
        .on("mouseout", function() {
          tooltip.style("opacity", 0);
        });

      svg.append("text")
        .attr("x", margin.left)
        .attr("y", height - 12)
        .style("font-size", "12px")
        .style("fill", "#555")
        .text("Data source: McDonald’s menu nutrition dataset");
    </script>
  </body>
</html>
